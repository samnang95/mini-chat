name: mini_chat
description: "A new Flutter project."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  get: ^4.7.2
  easy_localization: ^3.0.8
  flutter_svg: ^2.2.4
  dio: ^5.7.0
  flutter_dotenv: ^5.2.1
  font_awesome_flutter: ^10.7.0
  lottie: ^3.3.3
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.2
  cloud_firestore: ^5.6.6
  firebase_messaging: ^15.0.3
  flutter_local_notifications: ^17.2.1
  image_picker: ^1.1.2
  get_storage: ^2.1.1
  record: ^6.2.0
  audioplayers: ^6.0.0
  permission_handler: ^11.3.1
  path_provider: ^2.1.3
  googleapis_auth: ^1.6.0
  http: ^1.2.0
  agora_rtc_engine: ^6.2.0
  google_sign_in: ^7.2.0
  sign_in_with_apple: ^7.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/translations/
    - assets/icons/
    - assets/images/
    - assets/lottie/
    - assets/services/
    - .env.dev
    - .env.staging
    - .env.prod

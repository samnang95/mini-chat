name: mini_chat
description: "A new Flutter project."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  get: ^4.7.2
  easy_localization: ^3.0.8
  flutter_svg: ^2.2.4
  dio: ^5.7.0
  flutter_dotenv: ^5.2.1
  font_awesome_flutter: ^10.7.0
  lottie: ^3.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/translations/
    - assets/icons/
    - assets/images/
    - assets/lottie/
    - .env.dev
    - .env.staging
    - .env.prod
